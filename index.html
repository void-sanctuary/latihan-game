<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Sanctuary - Mini Teaser</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .game-container {
            text-align: center;
            max-width: 500px;
            border: 1px solid #333;
            padding: 30px;
            background-color: #141414;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
        }
        h1 { color: #ff3333; font-size: 1.5rem; }
        p { font-size: 1.1rem; line-height: 1.6; }
        .btn {
            background-color: #222;
            color: #ff3333;
            border: 1px solid #ff3333;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
            border-radius: 4px;
            width: 80%;
        }
        .btn:hover { background-color: #ff3333; color: #0d0d0d; }
    </style>
</head>
<body>

<div class="game-container" id="gameBox">
    <h1>Kamar Terkunci</h1>
    <p>Kamu terbangun di sebuah ruangan gelap berbau debu tua. Di depanmu ada sebuah pintu besi besar tanpa gagang, hanya ada sebuah papan ketik angka digital yang menyala merah.</p>
    <p>Sebuah coretan darah di dinding tertulis: <em>"Berapa jumlah total saudara kandung ditambah keponakanmu?"</em></p>
    <button class="btn" onclick="pilih(15)">Ketik: "15"</button>
    <button class="btn" onclick="pilih(10)">Ketik: "10"</button>
    <button class="btn" onclick="pilih(5)">Ketik: "5"</button>
</div>

<script>
function pilih(jawaban) {
    const box = document.getElementById('gameBox');
    if(jawaban === 15) {
        box.innerHTML = `
            <h1 style="color: #00ff00;">Pintu Terbuka!</h1>
            <p>Klik! Terdengar suara kunci besi bergeser. Pintu perlahan terbuka lebar menampilkan cahaya terang mendatar.</p>
            <p><strong>Selamat!</strong> Kamu berhasil lolos dari jebakan pertama Void Sanctuary. Akun GitHub kamu siap 100%!</p>
            <button class="btn" style="border-color: #00ff00; color: #00ff00;" onclick="location.reload()">Main Lagi</button>
        `;
    } else {
        box.innerHTML = `
            <h1>Akses Ditolak!</h1>
            <p>Tettt! Alarm berdengung kencang. Ruangan terasa semakin menyempit dan dingin. Angka itu salah...</p>
            <button class="btn" onclick="location.reload()">Coba Lagi</button>
        `;
    }
}
</script>

</body>
</html>
