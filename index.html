<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cozy Forest - Dark Mode</title>
    <style>
        body {
            margin: 0;
            background-color: #1A1D1A; /* Dark mode yang adem */
            color: #C1D0B5; /* Hijau pucat biar gak silau */
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            text-align: center;
        }

        .click-area {
            background-color: #2D342D; /* Hijau gelap buat tombol */
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #4A574A;
        }

        .shop-container {
            width: 100%;
            background-color: #242824;
            padding: 20px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        /* Tombol Start Musik */
        #music-btn {
            background: #4A574A;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cozy Forest</h1>
        <h2 id="clover-count">0 🍀</h2>
        <button id="music-btn" onclick="startMusic()">🎵 Nyalakan Musik Healing</button>
    </div>

    <div class="click-area" onclick="tapClover()">
        <div style="font-size: 5rem;">🍀</div>
    </div>

    <div class="shop-container">
        <p>Hutan sedang sunyi...</p>
    </div>

    <script>
        let clovers = 0;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function tapClover() {
            clovers++;
            document.getElementById('clover-count').innerText = clovers + " 🍀";
            playTwing();
        }

        function playTwing() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // BGM Healing sederhana menggunakan Oscillator looping
        function startMusic() {
            document.getElementById('music-btn').innerText = "Playing... 🎵";
            document.getElementById('music-btn').disabled = true;
            
            // Loop suara ambient lembut
            setInterval(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = 220; // Nada rendah yang dalam
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
                osc.start();
                osc.stop(audioCtx.currentTime + 2);
            }, 3000);
        }
    </script>
</body>
</html>
