<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Hindari Kotak</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Mencegah scroll */
            touch-action: none; /* Mencegah zoom saat tap */
        }
        #gameArea {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #333;
        }
        #player {
            position: absolute;
            bottom: 20px;
            left: 50%;
            width: 50px;
            height: 50px;
            background-color: #00ffcc;
            border-radius: 5px;
            transform: translateX(-50%);
            transition: left 0.1s ease;
        }
        .enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #ff4444;
            border-radius: 50%;
        }
        #scoreBoard {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            z-index: 10;
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background-color: #00ffcc;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="gameArea">
        <div id="scoreBoard">Skor: 0</div>
        <div id="player"></div>
        <button id="startBtn" onclick="startGame()">Mulai Main</button>
    </div>

    <script>
        const player = document.getElementById('player');
        const gameArea = document.getElementById('gameArea');
        const scoreBoard = document.getElementById('scoreBoard');
        const startBtn = document.getElementById('startBtn');
        
        let playerPos = 50; // Posisi pemain dalam persen (%)
        let gameInterval;
        let enemyInterval;
        let score = 0;
        let isGameOver = false;

        // Kontrol Sentuh untuk HP
        gameArea.addEventListener('touchmove', function(e) {
            if (isGameOver) return;
            let touchX = e.touches[0].clientX;
            let areaWidth = gameArea.clientWidth;
            playerPos = (touchX / areaWidth) * 100;
            
            // Batasi agar tidak keluar layar
            if (playerPos < 5) playerPos = 5;
            if (playerPos > 95) playerPos = 95;
            
            player.style.left = playerPos + '%';
        });

        // Kontrol Mouse untuk PC (opsional)
        gameArea.addEventListener('mousemove', function(e) {
            if (isGameOver) return;
            let areaWidth = gameArea.clientWidth;
            playerPos = (e.clientX / areaWidth) * 100;
            player.style.left = playerPos + '%';
        });

        function startGame() {
            startBtn.style.display = 'none';
            isGameOver = false;
            score = 0;
            scoreBoard.innerText = 'Skor: 0';
            
            // Hapus musuh lama jika ada
            document.querySelectorAll('.enemy').forEach(e => e.remove());

            gameInterval = setInterval(updateGame, 20);
            enemyInterval = setInterval(createEnemy, 1000);
        }

        function createEnemy() {
            if (isGameOver) return;
            const enemy = document.createElement('div');
            enemy.classList.add('enemy');
            enemy.style.left = Math.random() * 90 + '%';
            enemy.style.top = '-50px';
            gameArea.appendChild(enemy);
        }

        function updateGame() {
            if (isGameOver) return;

            const enemies = document.querySelectorAll('.enemy');
            const playerRect = player.getBoundingClientRect();

            enemies.forEach(enemy => {
                let top = parseInt(window.getComputedStyle(enemy).getPropertyValue('top'));
                
                // Gerakkan musuh ke bawah
                enemy.style.top = (top + 5) + 'px';

                // Cek Tabrakan
                const enemyRect = enemy.getBoundingClientRect();
                if (
                    playerRect.left < enemyRect.right &&
                    playerRect.right > enemyRect.left &&
                    playerRect.top < enemyRect.bottom &&
                    playerRect.bottom > enemyRect.top
                ) {
                    gameOver();
                }

                // Hapus musuh jika sudah lewat bawah dan tambah skor
                if (top > window.innerHeight) {
                    enemy.remove();
                    score++;
                    scoreBoard.innerText = 'Skor: ' + score;
                }
            });
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval);
            clearInterval(enemyInterval);
            alert('Game Over! Skor kamu: ' + score);
            startBtn.style.display = 'block';
            startBtn.innerText = 'Main Lagi';
        }
    </script>
</body>
</html>
