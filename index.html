<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Sanctuary - The Beginning</title>
    <style>
        body {
            background-color: #0b0b0f;
            color: #d1d1d6;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .game-container {
            text-align: center;
            max-width: 500px;
            border: 1px solid #2c2c35;
            padding: 30px;
            background-color: #12121a;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.15);
        }
        .avatar {
            font-size: 50px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        h1 { color: #a182ff; font-size: 1.4rem; margin-bottom: 20px; letter-spacing: 2px; }
        p { font-size: 1rem; line-height: 1.7; text-align: left; min-height: 80px; }
        .btn {
            background-color: #1c1c24;
            color: #a182ff;
            border: 1px solid #a182ff;
            padding: 12px 20px;
            margin: 10px auto;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.3s;
            border-radius: 6px;
            width: 100%;
            display: block;
            box-sizing: border-box;
        }
        .btn:hover { background-color: #a182ff; color: #12121a; }
        .ending { color: #ff5555; font-weight: bold; }
    </style>
</head>
<body>

<!-- Musik Latar Belakang Misteri -->
<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mp3">
</audio>

<div class="game-container">
    <!-- Gambar Imut Maskot Pixel Art (Bisa Berubah Sesuai Alur) -->
    <div class="avatar" id="gameAvatar">⏳</div>
    
    <h1 id="gameTitle">VOID SANCTUARY</h1>
    <p id="gameText">Kelopak matamu terasa berat. Saat berhasil terbangun, kamu tidak lagi berada di kamarmu yang hangat, melainkan terbaring di atas lantai marmer hitam yang dingin...</p>
    
    <div id="actionBox">
        <button class="btn" onclick="lanjutAlur(1)">Lanjut Ketuk . . .</button>
    </div>
</div>

<script>
// Menyimpan data alur cerita dari A sampai Z
const cerita = [
    {
        avatar: "👁️‍🗨️",
        teks: "Keheningan di tempat ini terasa mencekam. Di atas langit-langit, tidak ada lampu, melainkan pusaran kabut keunguan yang berputar lambat lambat. Kamu menyadari satu hal: kamu terjebak di dimensi lain.",
        tombol: `<button class="btn" onclick="lanjutAlur(2)">Periksa Sekeliling</button>`
    },
    {
        avatar: "🐈‍⬛",
        teks: "Saat mencoba berdiri, langkahmu terhenti. Seekor kucing hitam bermata ungu menyala muncul dari balik bayangan pelan-pelan. Ia tidak mengeong, tapi suaranya berdengung langsung di dalam kepalamu: 'Selamat datang, Sang Penulis kisah buruk.'"
    },
    {
        avatar: "📜",
        teks: "Kucing itu menjatuhkan sebuah gulungan kertas usang di depan kakimu. Di dalamnya tertulis sebaris kalimat berlumur tinta merah: 'Setiap cerita butuh akhir. Jika kamu tidak menentukan akhirmu sekarang, kegelapan yang akan memilihkan untukmu.'"
    },
    {
        avatar: "🚪",
        teks: "Tiba-tiba, dinding marmer di depanmu terbelah menjadi tiga buah celah pintu energi. Kucing hitam itu melompat mundur dan menghilang. Inilah momen penentuanmu. Pilih takdirmu, Naz."
    }
];

function putarMusik() {
    const musik = document.getElementById('bgMusic');
    if (musik.paused) {
        musik.volume = 0.3;
        musik.play().catch(e => console.log("Musik aktif setelah interaksi."));
    }
}

function lanjutAlur(step) {
    putarMusik(); // Musik otomatis menyala pelan saat tombol pertama diklik
    
    const avatar = document.getElementById('gameAvatar');
    const teks = document.getElementById('gameText');
    const actionBox = document.getElementById('actionBox');
    
    if (step < cerita.length) {
        // Alur cerita mengalir alami berjalan maju
        avatar.innerHTML = cerita[step].avatar;
        teks.innerHTML = cerita[step].teks;
        
        // Atur tombol otomatis untuk langkah berikutnya
        if (step === cerita.length - 1) {
            // Jika sudah di ujung alur (Z), tampilkan 3 Pilihan Ending
            actionBox.innerHTML = `
                <button class="btn" onclick="pilihEnding('cahaya')">✨ Masuk ke Pintu Cahaya Putih</button>
                <button class="btn" onclick="pilihEnding('void')">🔮 Melebur Bersama Kabut Void</button>
                <button class="btn" onclick="pilihEnding('kembali')">↩️ Tolak Memilih & Berbalik Arah</button>
            `;
        } else {
            actionBox.innerHTML = `<button class="btn" onclick="lanjutAlur(${step + 1})">Lanjut . . .</button>`;
        }
    }
}

function pilihEnding(opsi) {
    const avatar = document.getElementById('gameAvatar');
    const judul = document.getElementById('gameTitle');
    const teks = document.getElementById('gameText');
    const actionBox = document.getElementById('actionBox');
    
    judul.innerHTML = "TAKDIR AKHIR";
    
    if (opsi === 'cahaya') {
        avatar.innerHTML = "🕊️";
        teks.innerHTML = "Kamu melangkah mantap ke dalam cahaya putih. Rasa hangat menjalar ke seluruh tubuhmu. Perlahan, suara alarm HP-mu berbunyi... Kamu terbangun di kasurmu sendiri. Itu tadi cuma mimpi buruk... atau peringatan? <br><br><span class='ending'>[ ENDING A: Kembali ke Realitas ]</span>";
    } else if (opsi === 'void') {
        avatar.innerHTML = "👑";
        teks.innerHTML = "Kamu membiarkan kabut ungu menelan tubuhmu. Alih-alih hancur, kamu justru merasakan kekuatan besar. Kamu berhenti menjadi manusia dan resmi menjadi penguasa baru di Void Sanctuary ini. <br><br><span class='ending'>[ ENDING B: Penguasa Kegelapan ]</span>";
    } else if (opsi === 'kembali') {
        avatar.innerHTML = "🌀";
        teks.innerHTML = "Kamu keras kepala dan menolak takdir yang disediakan. Kamu berbalik arah dan berlari ke kegelapan abadi. Ceritamu macet, terjebak di dalam draf yang tidak pernah selesai ditulis. <br><br><span class='ending'>[ ENDING C: Penulis yang Tersesat ]</span>";
    }
    
    // Tombol untuk mereset game
    actionBox.innerHTML = `<button class="btn" onclick="location.reload()">Ulangi Dari Awal Kisah</button>`;
}
</script>

</body>
</html>
